name: Deploy KMP Web Simulation

on:
  push:
    branches:
      - main 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    # ⬇️ THIS FORCE-SHIFTS EXECUTION SCOPE INTO THE KIOSK SUBFOLDER
    defaults:
      run:
        working-directory: kiosk

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: kiosk

      - name: Build WebAssembly Production Distribution
        run: ./gradlew wasmJsBrowserDistribution

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'kiosk/composeApp/build/dist/wasmJs/productionExecutable/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4